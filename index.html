<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',sans-serif;background:#0a0f1e;color:#e8e6e0;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#2a3550;border-radius:4px}
input,select,button{font-family:'Sora',sans-serif}
/* Layout */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:#111827;border-bottom:1px solid #1e2a45;padding:10px 14px;flex-shrink:0;display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:70px}
.mob-bar{position:fixed;bottom:0;left:0;right:0;background:#111827;border-top:1px solid #1e2a45;display:flex;z-index:50;padding:6px 0 env(safe-area-inset-bottom,0)}
/* Cards */
.card{background:#111827;border:1px solid #1e2a45;border-radius:12px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:12.5px;transition:all .14s;white-space:nowrap;line-height:1}
.btn:active{transform:scale(.97)}
.btn-blue{background:#1a4fa8;color:#fff}.btn-blue:hover{background:#1540a0}
.btn-green{background:#1a7a4a;color:#fff}.btn-green:hover{background:#156038}
.btn-ghost{background:transparent;color:#667;border:1.5px solid #2a3550}.btn-ghost:hover{background:#1a2035;color:#bbb}
.btn-red{background:transparent;color:#e85555;border:1.5px solid #3a1818}.btn-red:hover{background:#2a1010}
.btn-sm{padding:5px 10px;font-size:11.5px}
/* Inputs */
.inp{width:100%;padding:10px 13px;background:#1a2035;border:1.5px solid #2a3550;border-radius:8px;color:#e8e6e0;font-size:13.5px;outline:none;transition:border .16s}
.inp:focus{border-color:#1a6fe0}
.inp::placeholder{color:#3a4560}
.sel{width:100%;padding:9px 12px;background:#1a2035;border:1.5px solid #2a3550;border-radius:8px;color:#e8e6e0;font-size:12.5px;outline:none;cursor:pointer;appearance:none;transition:border .16s}
.sel:focus{border-color:#1a6fe0}
.sel option{background:#1a2035}
/* Mobile nav */
.mbb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 4px;cursor:pointer;border:none;background:transparent;color:#445;transition:color .14s}
.mbb.on{color:#1a6fe0}
.mbb span:first-child{font-size:19px}
.mbb span:last-child{font-size:9px;font-weight:700;letter-spacing:.3px}
/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:#1a2035;color:#667}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:#111827;border:1px solid #1e2a45;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0)}
@media(min-width:600px){.ov{align-items:center}.modal{border-radius:16px;max-height:85vh}}
/* Toast */
.toast-box{position:fixed;bottom:75px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:tIn .26s cubic-bezier(.34,1.56,.64,1);max-width:260px}
.toast.s{background:#1a7a4a}.toast.i{background:#1a3a70}.toast.e{background:#8b2020}
@keyframes tIn{from{opacity:0;transform:translateX(24px) scale(.92)}to{opacity:1;transform:none}}
/* Trader card */
.tc{background:#111827;border:1px solid #1e2a45;border-radius:12px;padding:13px 14px;cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.tc:hover,.tc:active{background:#161f35}
.tc.visited-card{border-left-color:#1a7a4a}
.tc.fav-card{border-left-color:#d4850a}
/* Stats bar */
.sbar{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:12px 14px}
.sitem{background:#111827;border:1px solid #1e2a45;border-radius:9px;padding:10px 12px;text-align:center}
/* Search highlight */
mark{background:#1a4fa8;color:#fff;border-radius:3px;padding:0 2px}
/* Visited badge */
.vbadge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:#0a2a1a;color:#1a7a4a;border:1px solid #1a4a2a}
.fbadge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;background:#2a1a00;color:#d4850a;border:1px solid #4a3000}
/* Filter pills */
.fpill{padding:5px 12px;border-radius:18px;border:1.5px solid #2a3550;background:transparent;color:#556;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap;font-family:'Sora',sans-serif}
.fpill.on{background:#1a2a50;border-color:#1a6fe0;color:#6ab0f0}
/* Section label */
.slbl{font-size:10px;color:#334;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:10px 14px 5px}
/* Call/Whatsapp action buttons */
.act-btn{display:flex;align-items:center;justify-content:center;gap:5px;flex:1;padding:10px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:12.5px;font-family:'Sora',sans-serif;transition:all .14s}
.act-btn:active{transform:scale(.97)}
@media print{
  .mob-bar,.topbar,.no-print{display:none!important}
  body{background:#fff!important;color:#000!important}
  .tc,.card{background:#fff!important;border-color:#ddd!important;color:#000!important}
}
</style>

const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const load=(k,def)=>{try{const d=localStorage.getItem(k);if(d)return JSON.parse(d);}catch{}return def;};
const catIcon=cat=>CAT_ICONS[cat]||"🏥";

function highlight(text,q){
  if(!q||!text)return text;
  const idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx<0)return text;
  return h(Fragment,null,
    text.slice(0,idx),
    h("mark",null,text.slice(idx,idx+q.length)),
    text.slice(idx+q.length)
  );
}

/* ── useToast ── */
function useToast(){
  const[list,set]=useState([]);
  const timers=useRef({});
  const add=useCallback((msg,type)=>{
    type=type||"s";
    const id=Date.now()+Math.random();
    set(l=>[...l,{id,msg,type}]);
    timers.current[id]=setTimeout(()=>{set(l=>l.filter(x=>x.id!==id));delete timers.current[id];},2800);
  },[]);
  useEffect(()=>()=>Object.values(timers.current).forEach(clearTimeout),[]);
  return[list,add];
}

        ),
        D({style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}},
          S({className:"tag",style:{fontSize:10.5}},catIcon(trader.category)+" "+trader.category),
          isVisited&&S({className:"vbadge"},"✓"),
          isFav&&S({style:{color:"#d4850a",fontSize:12}},"★")
        ),
        phoneDisplay&&D({style:{fontSize:12,color:"#667",fontFamily:"'JetBrains Mono',monospace"}},
          "📱 ",highlight(phoneDisplay,q)
        ),
        trader.address&&D({style:{fontSize:11,color:"#3a4560",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
          "📍 ",highlight(trader.address.replace(/Lucknow, Uttar Pradesh.*/,"Lucknow").trim(),q)
        )
      )
    )
  );
}

/* ── MAIN APP ── */
function App(){
  const[q,setQ]=useState("");
  const[catFilter,setCatFilter]=useState("all");
  const[statusFilter,setStatusFilter]=useState("all"); // all|visited|fav|unvisited
  const[sortBy,setSortBy]=useState("name"); // name|category
  const[tab,setTab]=useState("search"); // search|visited|favs|stats
  const[selected,setSelected]=useState(null);
  const[favs,setFavs]=useState(()=>load(FAVORITES_KEY,{}));
  const[visited,setVisited]=useState(()=>load(VISITED_KEY,{}));
  const[notes,setNotes]=useState(()=>load(NOTES_KEY,{}));
  const[toasts,addToast]=useToast();

  useEffect(()=>save(FAVORITES_KEY,favs),[favs]);
  useEffect(()=>save(VISITED_KEY,visited),[visited]);
  useEffect(()=>save(NOTES_KEY,notes),[notes]);

  const allTraders=SEED_DATA;
  const cats=useMemo(()=>["all",...new Set(allTraders.map(t=>t.category)).keys()].sort(),[]);

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    let arr=allTraders.filter(t=>{
      const mq=!lq||t.name.toLowerCase().includes(lq)||t.category.toLowerCase().includes(lq)||t.phone.includes(lq)||t.address.toLowerCase().includes(lq);
      const mc=catFilter==="all"||t.category===catFilter;
      const ms=statusFilter==="all"||(statusFilter==="visited"&&visited[t.id])||(statusFilter==="fav"&&favs[t.id])||(statusFilter==="unvisited"&&!visited[t.id]);
      return mq&&mc&&ms;
    });
    if(sortBy==="name") arr.sort((a,b)=>a.name.localeCompare(b.name));
    else arr.sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));
    return arr;
  },[q,catFilter,statusFilter,sortBy,favs,visited]);

  const favList=useMemo(()=>allTraders.filter(t=>favs[t.id]),[favs,allTraders]);
  const visitedList=useMemo(()=>allTraders.filter(t=>visited[t.id]),[visited,allTraders]);

  const toggleFav=id=>setFavs(f=>({...f,[id]:!f[id]}));
  const toggleVisited=id=>setVisited(v=>({...v,[id]:!v[id]}));
  const saveNote=(id,note)=>setNotes(n=>({...n,[id]:note}));

  /* Stats */
  const totalVisited=Object.values(visited).filter(Boolean).length;
  const totalFavs=Object.values(favs).filter(Boolean).length;
  const catCounts=useMemo(()=>{
    const cc={};
    allTraders.forEach(t=>{cc[t.category]=(cc[t.category]||0)+1;});
    return Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  },[allTraders]);

  const PageContent=()=>{
    if(tab==="visited") return D({style:{padding:"8px 12px"}},
      D({className:"slbl"},`Visited Traders (${visitedList.length})`),
      visitedList.length===0
        ?D({style:{textAlign:"center",padding:"40px 20px",color:"#334"}},
            D({style:{fontSize:40,marginBottom:10}},"📍"),
            D({style:{fontSize:14,color:"#445"}},"No visited traders yet"),
            D({style:{fontSize:12,color:"#334",marginTop:5}},"Open any trader and tap 'Mark Visited'")
          )
        :D({style:{display:"flex",flexDirection:"column",gap:8}},
            ...visitedList.map(t=>h(TraderCard,{key:t.id,trader:t,q:"",isFav:!!favs[t.id],isVisited:true,onClick:()=>setSelected(t)}))
          )
    );

    if(tab==="favs") return D({style:{padding:"8px 12px"}},
      D({className:"slbl"},`Favourite Traders (${favList.length})`),
      favList.length===0
        ?D({style:{textAlign:"center",padding:"40px 20px",color:"#334"}},
            D({style:{fontSize:40,marginBottom:10}},"★"),
            D({style:{fontSize:14,color:"#445"}},"No favourites yet"),
            D({style:{fontSize:12,color:"#334",marginTop:5}},"Open any trader and tap 'Add Favourite'")
          )
        :D({style:{display:"flex",flexDirection:"column",gap:8}},
            ...favList.map(t=>h(TraderCard,{key:t.id,trader:t,q:"",isFav:true,isVisited:!!visited[t.id],onClick:()=>setSelected(t)}))
          )
    );

    if(tab==="stats") return D({style:{padding:"8px 12px"}},
      D({className:"slbl"},"Overview"),
      D({className:"sbar",style:{padding:"8px 0 12px"}},
        ...[
          {l:"Total Traders",v:allTraders.length,c:"#1a6fe0",i:"🏪"},
          {l:"Visited",v:totalVisited,c:"#1a7a4a",i:"✓"},
          {l:"Favourites",v:totalFavs,c:"#d4850a",i:"★"},
          {l:"Remaining",v:allTraders.length-totalVisited,c:"#e8552a",i:"🎯"},
        ].map(s=>D({key:s.l,className:"sitem",style:{borderTop:"2px solid "+s.c}},
          D({style:{fontSize:18,marginBottom:4}},s.i),
          D({style:{fontSize:22,fontWeight:800,color:"#f0ede6"}},""+s.v),
          D({style:{fontSize:9.5,color:"#445",fontWeight:700,textTransform:"uppercase",letterSpacing:.4,marginTop:3}},s.l)
        ))
      ),
      /* Progress bar */
      D({className:"card",style:{margin:"0 0 14px",padding:"14px 16px"}},
        D({style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
          D({style:{fontSize:12,fontWeight:600,color:"#889"}},"Visit Progress"),
          D({style:{fontSize:12,fontWeight:700,color:"#4aaa7a"}},Math.round(totalVisited/allTraders.length*100)+"%")
        ),
        D({style:{height:8,background:"#1a2035",borderRadius:4,overflow:"hidden"}},
          D({style:{height:"100%",width:Math.round(totalVisited/allTraders.length*100)+"%",background:"linear-gradient(90deg,#1a6fe0,#1a7a4a)",borderRadius:4,transition:"width .5s"}})
        ),
        D({style:{fontSize:11,color:"#334",marginTop:6}},totalVisited+" of "+allTraders.length+" traders visited")
      ),
      D({className:"slbl"},"Traders by Category"),
      D({style:{display:"flex",flexDirection:"column",gap:6}},
        ...catCounts.slice(0,15).map(([cat,cnt])=>D({key:cat,className:"card",style:{padding:"10px 14px",display:"flex",alignItems:"center",gap:10}},
          S({style:{fontSize:16,flexShrink:0}},catIcon(cat)),
          D({style:{flex:1}},
            D({style:{fontSize:12.5,fontWeight:600,color:"#c8c6c0",marginBottom:3}},cat),
            D({style:{height:4,background:"#1a2035",borderRadius:2,overflow:"hidden"}},
              D({style:{height:"100%",width:Math.round(cnt/catCounts[0][1]*100)+"%",background:"#1a6fe0",borderRadius:2}})
            )
          ),
          S({style:{fontSize:12,fontWeight:700,color:"#4a6fa0",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}},cnt)
        ))
      )
    );

    /* Search tab (default) */
    return D({},
      /* Search bar */
      D({style:{padding:"10px 12px 6px"}},
        D({style:{position:"relative"}},
          S({style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:"#445",pointerEvents:"none"}},"🔍"),
          Inp({className:"inp",value:q,onChange:e=>setQ(e.target.value),
            placeholder:"Search by name, type, phone, area…",
            style:{paddingLeft:36,paddingRight:q?34:12,fontSize:13.5}}),
          q&&Btn({onClick:()=>setQ(""),style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#445",fontSize:17,cursor:"pointer",lineHeight:1}},"×")
        )
      ),

      /* Filters */
      D({style:{padding:"4px 12px 6px",display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch"}},
        ...[["all","All"],["visited","✓ Visited"],["fav","★ Favs"],["unvisited","⭕ Unvisited"]].map(([v,l])=>
          Btn({key:v,className:"fpill"+(statusFilter===v?" on":""),onClick:()=>setStatusFilter(v)},l)
        )
      ),

      /* Category + Sort row */
      D({style:{padding:"0 12px 8px",display:"flex",gap:7,alignItems:"center"}},
        D({style:{flex:1}},
          Sel({className:"sel",style:{fontSize:11.5,padding:"6px 10px"},value:catFilter,onChange:e=>setCatFilter(e.target.value)},
            h("option",{value:"all"},"All Types ("+allTraders.length+")"),
            ...catCounts.map(([cat,cnt])=>h("option",{key:cat,value:cat},catIcon(cat)+" "+cat+" ("+cnt+")"))
          )
        ),
        Btn({className:"btn btn-ghost btn-sm",onClick:()=>setSortBy(s=>s==="name"?"category":"name"),
          style:{flexShrink:0,fontSize:11}},
          sortBy==="name"?"A-Z":"Type"
        ),
        D({style:{padding:"4px 9px",background:"#111827",border:"1px solid #1e2a45",borderRadius:6,fontSize:10.5,color:"#334",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap",flexShrink:0}},
          filtered.length
        )
      ),

      /* Results */
      D({style:{padding:"0 12px",display:"flex",flexDirection:"column",gap:7}},
        filtered.length===0
          ?D({style:{textAlign:"center",padding:"40px 20px",color:"#334"}},
              D({style:{fontSize:38,marginBottom:10}},"🔍"),
              D({style:{fontSize:14,color:"#445"}},"No traders found"),
              D({style:{fontSize:12,color:"#334",marginTop:4}},`"${q}" did not match any trader`)
            )
          :filtered.slice(0,100).map(t=>h(TraderCard,{key:t.id,trader:t,q,
              isFav:!!favs[t.id],isVisited:!!visited[t.id],
              onClick:()=>setSelected(t)
            }))
      ),
      filtered.length>100&&D({style:{textAlign:"center",padding:"14px",color:"#445",fontSize:12}},
        "Showing first 100 of "+filtered.length+" results — refine your search to see more"
      )
    );
  };

  return D({className:"app"},
    /* Top bar */
    D({className:"topbar no-print"},
      D({style:{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#1a4fa8,#0a2a70)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}},"🏪"),
      D({style:{flex:1}},
        D({style:{fontWeight:800,fontSize:15,color:"#f0ede6",letterSpacing:"-.3px",lineHeight:1}},"MediTrade"),
        D({style:{fontSize:9.5,color:"#334",fontWeight:700,letterSpacing:.5}},"LUCKNOW TRADER DIRECTORY")
      ),
      D({style:{padding:"4px 9px",background:"#1a2035",border:"1px solid #1e2a45",borderRadius:6,fontSize:10,color:"#445",fontFamily:"'JetBrains Mono',monospace"}},
        allTraders.length+" traders"
      )
    ),

    /* Main content */
    D({className:"content"},h(PageContent)),

    /* Bottom nav */
    D({className:"mob-bar no-print"},
      ...[
        {t:"search",i:"🔍",l:"Search"},
        {t:"favs",i:"★",l:"Favs"},
        {t:"visited",i:"✓",l:"Visited"},
        {t:"stats",i:"📊",l:"Stats"},
      ].map(({t,i,l})=>Btn({key:t,className:"mbb"+(tab===t?" on":""),onClick:()=>setTab(t)},
        S({style:{fontSize:20}},i),S({},""+l)
      ))
    ),

    /* Trader detail modal */
    selected&&h(TraderModal,{
      trader:selected,
      isFav:!!favs[selected.id],
      isVisited:!!visited[selected.id],
      notes:notes[selected.id]||"",
      onClose:()=>setSelected(null),
      onToggleFav:()=>toggleFav(selected.id),
      onToggleVisited:()=>toggleVisited(selected.id),
      onSaveNotes:note=>saveNote(selected.id,note),
      toast:addToast
    }),

    /* Toasts */
    D({className:"toast-box no-print"},
      ...toasts.map(t=>D({key:t.id,className:"toast "+t.type},
        S({},t.type==="s"?"✓":t.type==="e"?"✕":"ℹ"),S({},t.msg)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>

  /* iOS tip */
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);

  var isStandalone=window.navigator.standalone===true;
  if(isIOS&&isSafari&&!isStandalone&&!localStorage.getItem("mt_ios_ok")){

})();
